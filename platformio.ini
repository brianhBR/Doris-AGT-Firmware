; PlatformIO Project Configuration File
; https://docs.platformio.org/page/projectconf.html

[platformio]
default_envs = SparkFun_RedBoard_Artemis_ATP

[env:SparkFun_RedBoard_Artemis_ATP]
platform = https://github.com/nigelb/platform-apollo3blue.git
board = SparkFun_RedBoard_Artemis_ATP
framework = arduino

; framework-arduinoapollo3 was delisted from the PlatformIO registry, so pull
; it straight from SparkFun's repo. Matches the v2.2.1 that the platform
; historically resolved to from the registry.
platform_packages =
	framework-arduinoapollo3 @ https://github.com/sparkfun/Arduino_Apollo3.git#v2.2.1

; Board configuration - Artemis Global Tracker uses RedBoard ATP settings
board_build.f_cpu = 48000000L
board_build.mcu = apollo3
board_build.variant = redboard_artemis_atp

; Upload configuration
upload_protocol = svl
upload_speed = 115200

; Monitor configuration
monitor_speed = 57600
monitor_port = COM12
; monitor_filters =
; 	direct
; 	time

; Library dependencies
lib_deps =
	sparkfun/SparkFun u-blox GNSS Arduino Library@^2.2.25
	https://github.com/sparkfun/SparkFun_IridiumSBD_I2C_Arduino_Library.git#v3.0.6
	https://github.com/mavlink/c_library_v2.git
	bblanchon/ArduinoJson@^6.21.3
	nanopb/Nanopb@^0.4.8
	; Meshtastic protobufs - temporarily disabled, using stubs
	; https://github.com/meshtastic/protobufs.git

; Exclude selftest main so we use main.cpp only (selftest env uses main_selftest.cpp)
build_src_filter = +<*> -<**/main_selftest.cpp>

; Build flags
build_flags =
	-DARDUINO_ARCH_APOLLO3
	-DPART_apollo3
	-DAM_PART_APOLLO3
	-DAM_PACKAGE_BGA
	-DARDUINO_REDBOARD_ARTEMIS_ATP
	-DMAVLINK_COMM_NUM_BUFFERS=2
	-DMAVLINK_USE_CONVENIENCE_FUNCTIONS
	-Wno-address-of-packed-member
	-Ilib/meshtastic

; Copy firmware binary to build/ folder with descriptive name
extra_scripts = post:copy_firmware.py

; Filesystem
board_upload.maximum_size = 960000

; ============================================================================
; No-relays build: all relay pin drives are no-ops (state tracking only)
; Build with:  pio run -e no-relays
; Upload with: pio run -e no-relays -t upload
; ============================================================================
[env:no-relays]
extends = env:SparkFun_RedBoard_Artemis_ATP
build_flags =
	${env:SparkFun_RedBoard_Artemis_ATP.build_flags}
	-DNO_RELAYS

; ============================================================================
; Native test environment: runs unit tests on host PC (no hardware needed)
; Run with:  pio test -e native
; ============================================================================
[env:native]
platform = native
build_flags =
	-DUNIT_TEST
	-DARDUINO=100
	-std=c++11
	-Itest/stubs
	-Iinclude
build_src_filter = -<*>
test_framework = unity

; ============================================================================
; Self-Test environment: GPS + Iridium + NeoPixel verification
; Build with: pio run -e selftest
; Upload with: pio run -e selftest -t upload
; ============================================================================
[env:selftest]
platform = https://github.com/nigelb/platform-apollo3blue.git
board = SparkFun_RedBoard_Artemis_ATP
framework = arduino

platform_packages =
	framework-arduinoapollo3 @ https://github.com/sparkfun/Arduino_Apollo3.git#v2.2.1

board_build.f_cpu = 48000000L
board_build.mcu = apollo3
board_build.variant = redboard_artemis_atp

upload_protocol = svl
upload_speed = 115200

monitor_speed = 57600
monitor_port = COM7

lib_deps =
	sparkfun/SparkFun u-blox GNSS Arduino Library@^2.2.25
	https://github.com/sparkfun/SparkFun_IridiumSBD_I2C_Arduino_Library.git#v3.0.6

build_flags =
	-DARDUINO_ARCH_APOLLO3
	-DPART_apollo3
	-DAM_PART_APOLLO3
	-DAM_PACKAGE_BGA
	-DARDUINO_REDBOARD_ARTEMIS_ATP

; Only compile the self-test main + SoftwareSerial (excludes all Doris modules)
build_src_filter = -<*> +<main_selftest.cpp> +<utils/SoftwareSerial.cpp>

extra_scripts = post:copy_firmware.py
board_upload.maximum_size = 960000