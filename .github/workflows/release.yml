name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    name: Build and publish firmware
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          # Full history + tags so git_version.py can `git describe --tags`
          # and embed the release tag as FIRMWARE_VERSION.
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install PlatformIO
        run: pip install platformio

      - name: Build default firmware (relays enabled)
        run: pio run -e SparkFun_RedBoard_Artemis_ATP

      - name: Build no-relays firmware
        run: pio run -e no-relays

      - name: Stage release binaries
        run: |
          mkdir -p release
          VERSION="${GITHUB_REF_NAME}"
          cp build/doris-agt.bin           "release/doris-agt-${VERSION}.bin"
          cp build/doris-agt-no-relays.bin "release/doris-agt-no-relays-${VERSION}.bin"
          ls -l release

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            release/doris-agt-${{ github.ref_name }}.bin
            release/doris-agt-no-relays-${{ github.ref_name }}.bin
          fail_on_unmatched_files: true
